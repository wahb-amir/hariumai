<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatzone Ai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --background: #f0f4f8;
            --header-bg: #ffffff;
            --user-bubble: #10B981;
            --user-text: #ffffff;
            --ai-bubble: #ffffff;
            --ai-text: #1f2937;
            --input-bg: #ffffff;
            --border-color: #e5e7eb;
            --font-family: 'Inter', sans-serif;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: var(--font-family);
            background-color: var(--background);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: var(--ai-text);
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
        }

        header {
            background-color: var(--header-bg);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
        }

        #chat-history {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message {
            max-width: 75%;
            padding: 0.75rem 1rem;
            border-radius: 1.25rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user {
            align-self: flex-end;
            background-color: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 0.5rem;
        }

        .assistant {
            align-self: flex-start;
            background-color: var(--ai-bubble);
            color: var(--ai-text);
            box-shadow: var(--shadow);
            border-bottom-left-radius: 0.5rem;
        }
        
        .typewriter-cursor {
            font-weight: bold;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        #chat-form {
            display: flex;
            padding: 1rem 1.5rem;
            gap: 0.5rem;
            background-color: var(--header-bg);
            border-top: 1px solid var(--border-color);
        }

        #chat-input {
            flex-grow: 1;
            border: 1px solid var(--border-color);
            border-radius: 9999px;
            padding: 0.75rem 1.25rem;
            font-size: 1rem;
            background-color: var(--input-bg);
            color: var(--ai-text);
            outline: none;
            transition: border-color 0.2s;
        }

        #chat-input:focus {
            border-color: var(--user-bubble);
        }

        #chat-form button {
            background-color: var(--user-bubble);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            flex-shrink: 0;
        }

        #chat-form button:hover {
            background-color: #059669;
        }

        #chat-form button:disabled {
            background-color: #d1d5db;
            cursor: not-allowed;
        }

        .loader {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .loader .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--ai-text);
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loader .dot:nth-child(1) { animation-delay: -0.32s; }
        .loader .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>Chatzone Ai</h1>
        </header>

        <div id="chat-history">
            <!-- Messages will be appended here -->
        </div>

        <form id="chat-form">
            <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
            <button type="submit" id="send-button">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </form>
    </div>

    <script>
        const chatHistory = document.getElementById('chat-history');
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const sendButton = document.getElementById('send-button');

        const history = [];

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const prompt = chatInput.value.trim();
            if (!prompt) return;

            chatInput.value = '';
            
            appendMessage('user', prompt);
            
            showLoader(true);

            try {
                const response = await fetch('https://harium-ai-backend.onrender.com/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                
                showLoader(false);
                appendMessage('assistant', data.response);

            } catch (error) {
                console.error('Error fetching AI response:', error);
                showLoader(false);
                appendMessage('assistant', 'Sorry, something went wrong. Please try again.');
            }
        });

        function appendMessage(role, content) {
            const messageWrapper = document.createElement('div');
            messageWrapper.className = 'message-wrapper';

            const messageElement = document.createElement('div');
            messageElement.className = `message ${role}`;
            
            messageWrapper.appendChild(messageElement);
            chatHistory.appendChild(messageWrapper);

            history.push({ role, content });

            if (role === 'assistant') {
                typewriter(messageElement, content);
            } else {
                messageElement.textContent = content;
            }
            scrollToBottom();
        }

        function typewriter(element, text) {
            let i = 0;
            element.innerHTML = '';
            const cursor = document.createElement('span');
            cursor.className = 'typewriter-cursor';
            cursor.textContent = '●';
            
            const typingInterval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML = text.substring(0, i + 1) + '<span class="typewriter-cursor">●</span>';
                    i++;
                } else {
                    clearInterval(typingInterval);
                    element.innerHTML = text; // Remove cursor when done
                }
            }, 50);
        }
        
        function showLoader(show) {
            let loader = document.getElementById('loader');
            if (show) {
                if (loader) return;
                const messageWrapper = document.createElement('div');
                messageWrapper.id = 'loader';
                messageWrapper.className = 'message-wrapper';
                
                const messageElement = document.createElement('div');
                messageElement.className = `message assistant loader`;
                messageElement.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>'
                
                messageWrapper.appendChild(messageElement);
                chatHistory.appendChild(messageWrapper);
                scrollToBottom();
            } else {
                if(loader) {
                    loader.remove();
                }
            }
        }

        function scrollToBottom() {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

    </script>
</body>
</html>
