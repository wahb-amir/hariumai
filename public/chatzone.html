<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatzone AI Beta</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7fff9;
            color: #1a202c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #chat-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #message-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            max-width: 85%;
        }
        .message .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 12px;
            background-color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        .message .content {
            padding: 12px 16px;
            border-radius: 10px;
            line-height: 1.5;
        }
        .user-message {
            align-self: flex-end;
            margin-left: auto;
        }
        .user-message .avatar {
            background-color: #48bb78;
            color: white;
        }
        .user-message .content {
            background-color: #48bb78;
            color: white;
            border-top-right-radius: 0;
        }
        .ai-message {
            align-self: flex-start;
        }
        .ai-message .avatar {
            background-color: #38a169;
            color: white;
        }
        .ai-message .content {
            background-color: #f0fdf4;
            border: 1px solid #d1fae5;
            color: #1a202c;
            border-top-left-radius: 0;
        }
        #input-form {
            display: flex;
            padding: 15px;
            border-top: 1px solid #e2e8f0;
        }
        #user-input {
            flex-grow: 1;
            border: 1px solid #cbd5e0;
            border-radius: 20px;
            padding: 10px 15px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        #user-input:focus {
            border-color: #38a169;
        }
        #send-button {
            margin-left: 10px;
            background-color: #38a169;
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s;
        }
        #send-button:hover {
            background-color: #2f855a;
        }
        #send-button:disabled {
            background-color: #9ae6b4;
            cursor: not-allowed;
        }
        .typing-cursor {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #38a169;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .loader {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .loader span {
            font-size: 0.9rem;
            color: #4a5568;
            margin-left: 8px;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="chat-container">
        <div id="message-container">
            <!-- Messages will be appended here -->
        </div>
        <form id="input-form">
            <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
            <button id="send-button" type="submit">
                <span>&#10148;</span>
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById('input-form');
        const input = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const messageContainer = document.getElementById('message-container');
        let isLoading = false;

        function appendMessage(role, content) {
            const messageEl = document.createElement('div');
            messageEl.classList.add('message', role === 'user' ? 'user-message' : 'ai-message');

            const avatar = document.createElement('div');
            avatar.classList.add('avatar');
            avatar.textContent = role === 'user' ? 'U' : 'AI';

            const contentEl = document.createElement('div');
            contentEl.classList.add('content');
            
            messageEl.appendChild(avatar);
            messageEl.appendChild(contentEl);

            if (role === 'assistant' && content === 'loading') {
                contentEl.innerHTML = '<div class="loader"><div class="typing-cursor"></div><span>AI is thinking...</span></div>';
            } else if (role === 'assistant') {
                typewriterEffect(contentEl, content);
            } else {
                contentEl.textContent = content;
            }

            messageContainer.appendChild(messageEl);
            messageContainer.scrollTop = messageContainer.scrollHeight;
            return messageEl;
        }

        function typewriterEffect(element, text) {
            let i = 0;
            element.innerHTML = "";
            const cursor = document.createElement('span');
            cursor.className = 'typing-cursor';
            element.appendChild(cursor);

            function type() {
                if (i < text.length) {
                    cursor.insertAdjacentText('beforebegin', text.charAt(i));
                    i++;
                    setTimeout(type, 20);
                } else {
                    cursor.remove();
                }
                 messageContainer.scrollTop = messageContainer.scrollHeight;
            }
            type();
        }

        async function handleSendMessage(e) {
            e.preventDefault();
            const userInput = input.value.trim();
            if (!userInput || isLoading) return;

            isLoading = true;
            sendButton.disabled = true;
            input.value = '';

            appendMessage('user', userInput);
            const loadingMessage = appendMessage('assistant', 'loading');

            try {
                const response = await fetch('https://harium-ai-backend.onrender.com/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: userInput })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const aiMessageContent = data.response || "Sorry, I couldn't get a response.";

                messageContainer.removeChild(loadingMessage);
                appendMessage('assistant', aiMessageContent);

            } catch (error) {
                console.error('Error fetching AI response:', error);
                messageContainer.removeChild(loadingMessage);
                appendMessage('assistant', 'Sorry, something went wrong on my end.');
            } finally {
                isLoading = false;
                sendButton.disabled = false;
                input.focus();
            }
        }

        form.addEventListener('submit', handleSendMessage);

        appendMessage('assistant', 'Welcome to Chatzone AI Beta! How can I help you today?');
    </script>
</body>
</html>
