<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatzone Ai Beta</title>
    <style>
        :root {
            --primary-color: #2E7D32; /* Darker Green */
            --secondary-color: #4CAF50; /* Green */
            --background-color: #f0f2f5;
            --text-color: #333;
            --white-color: #ffffff;
            --card-bg: #ffffff;
            --border-color: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background-color: var(--white-color);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .chat-header {
            background-color: var(--primary-color);
            color: var(--white-color);
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
            align-items: flex-start;
        }
        
        .message .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--secondary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            flex-shrink: 0;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.user .avatar {
            background-color: #ddd;
            color: #555;
        }

        .message .content {
            background-color: var(--card-bg);
            padding: 12px 16px;
            border-radius: 18px;
            border: 1px solid var(--border-color);
        }
        
        .message.user .content {
            background-color: var(--primary-color);
            color: var(--white-color);
            border: none;
        }

        .chat-input {
            display: flex;
            padding: 16px;
            border-top: 1px solid var(--border-color);
        }

        .chat-input input {
            flex-grow: 1;
            border: 1px solid #ccc;
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 1rem;
            outline: none;
        }
        
        .chat-input input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(46, 125, 50, 0.2);
        }

        .chat-input button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            margin-left: 10px;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s;
        }
        
        .chat-input button:hover {
            background-color: #1e5e21; /* Darker green */
        }

        .typing-cursor {
            display: inline-block;
            width: 10px;
            height: 1rem;
            background-color: var(--text-color);
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            from, to { background-color: transparent }
            50% { background-color: var(--text-color); }
        }
        
        .message.assistant .typing-cursor {
             background-color: var(--text-color);
        }

        .loading-indicator {
            display: flex;
            gap: 5px;
            padding: 12px 16px;
        }

        .loading-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ccc;
            animation: loading-bounce 1.4s infinite ease-in-out both;
        }

        .loading-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .loading-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes loading-bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">Chatzone Ai</div>
        <div class="chat-messages" id="chat-messages">
            <div class="message assistant">
                <div class="avatar">A</div>
                <div class="content">
                    Hello! I'm Chatzone Ai. How can I help you today?
                </div>
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Type your message...">
            <button id="send-button">&#10148;</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');

        const appendMessage = (sender, text) => {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            
            const avatar = document.createElement('div');
            avatar.classList.add('avatar');
            avatar.textContent = sender === 'user' ? 'You' : 'A';
            
            const contentDiv = document.createElement('div');
            contentDiv.classList.add('content');
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return contentDiv;
        };

        const showLoadingIndicator = () => {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', 'assistant');
            messageDiv.id = 'loading';
            
            const avatar = document.createElement('div');
            avatar.classList.add('avatar');
            avatar.textContent = 'A';
            
            const contentDiv = document.createElement('div');
            contentDiv.classList.add('loading-indicator');
            contentDiv.innerHTML = '<span></span><span></span><span></span>';
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        };
        
        const removeLoadingIndicator = () => {
            const loadingElement = document.getElementById('loading');
            if (loadingElement) {
                loadingElement.remove();
            }
        };

        const typeWriter = (element, text) => {
            let i = 0;
            const typingSpeed = 30; // milliseconds
            
            function type() {
                if (i < text.length) {
                    element.innerHTML = text.substring(0, i + 1) + '<span class="typing-cursor">●</span>';
                    i++;
                    setTimeout(type, typingSpeed);
                } else {
                    element.innerHTML = text; // Remove cursor when done
                }
            }
            type();
        };

        const handleSendMessage = async () => {
            const messageText = userInput.value.trim();
            if (messageText === '') return;

            appendMessage('user', messageText);
            userInput.value = '';
            
            showLoadingIndicator();

            try {
                // Correctly formatted POST request
                const response = await fetch('https://harium-ai-backend.onrender.com/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ prompt: messageText }),
                });

                removeLoadingIndicator();
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Network response was not ok. Status: ${response.status}. Message: ${errorText}`);
                }

                const data = await response.json();
                const aiResponse = data.response || "Sorry, I couldn't get a response.";
                
                const aiMessageContent = appendMessage('assistant', '');
                typeWriter(aiMessageContent, aiResponse);

            } catch (error) {
                console.error('Error:', error);
                removeLoadingIndicator();
                const errorContent = appendMessage('assistant', `Sorry, something went wrong. Please check the backend connection. Error: ${error.message}`);
            }
        };

        sendButton.addEventListener('click', handleSendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSendMessage();
            }
        });
    </script>
</body>
</html>
