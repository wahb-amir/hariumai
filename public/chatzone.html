<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatzone Ai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --background: 240 10% 3.9%;
            --foreground: 0 0% 98%;
            --card: 240 10% 3.9%;
            --card-foreground: 0 0% 98%;
            --popover: 240 10% 3.9%;
            --popover-foreground: 0 0% 98%;
            --primary: 0 0% 98%;
            --primary-foreground: 240 5.9% 10%;
            --secondary: 240 3.7% 15.9%;
            --secondary-foreground: 0 0% 98%;
            --muted: 240 3.7% 15.9%;
            --muted-foreground: 240 5% 64.9%;
            --accent: 240 3.7% 15.9%;
            --accent-foreground: 0 0% 98%;
            --border: 240 3.7% 15.9%;
            --input: 240 3.7% 15.9%;
            --ring: 240 4.9% 83.9%;

            --sidebar-background: 240 10% 3.9%;
            --sidebar-foreground: 0 0% 98%;
            --sidebar-primary: 0 0% 98%;
            --sidebar-primary-foreground: 240 5.9% 10%;
            --sidebar-accent: 240 3.7% 15.9%;
            --sidebar-accent-foreground: 0 0% 98%;
            --sidebar-border: 240 3.7% 15.9%;

            --radius: 0.5rem;
        }

        .light {
            --background: 0 0% 100%;
            --foreground: 0 0% 3.9%;
            --card: 0 0% 100%;
            --card-foreground: 0 0% 3.9%;
            --popover: 0 0% 100%;
            --popover-foreground: 0 0% 3.9%;
            --primary: 240 5.9% 10%;
            --primary-foreground: 0 0% 98%;
            --secondary: 0 0% 96.1%;
            --secondary-foreground: 0 0% 9%;
            --muted: 0 0% 96.1%;
            --muted-foreground: 0 0% 45.1%;
            --accent: 0 0% 96.1%;
            --accent-foreground: 0 0% 9%;
            --border: 0 0% 89.8%;
            --input: 0 0% 89.8%;
            --ring: 240 5.9% 10%;

            --sidebar-background: 0 0% 98%;
            --sidebar-foreground: 240 5.3% 26.1%;
            --sidebar-primary: 240 5.9% 10%;
            --sidebar-primary-foreground: 0 0% 98%;
            --sidebar-accent: 240 4.8% 95.9%;
            --sidebar-accent-foreground: 240 5.9% 10%;
            --sidebar-border: 220 13% 91%;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 280px;
            background-color: hsl(var(--sidebar-background));
            color: hsl(var(--sidebar-foreground));
            display: flex;
            flex-direction: column;
            border-right: 1px solid hsl(var(--sidebar-border));
            transition: width 0.3s ease;
        }
        
        #sidebar.collapsed {
            width: 0;
            padding: 0;
            overflow: hidden;
        }
        
        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                bottom: 0;
                z-index: 1000;
                transition: left 0.3s ease;
            }
            #sidebar.open {
                left: 0;
            }
            #sidebar-toggle {
                display: block !important;
            }
        }


        #sidebar-header {
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid hsl(var(--sidebar-border));
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background-color: black;
            color: white;
            font-weight: 900;
            border-radius: 50%;
            font-size: 1.25rem;
        }

        #sidebar-header h1 {
            font-size: 1.25rem;
            font-weight: 900;
        }

        #sidebar-content {
            flex-grow: 1;
            padding: 0.5rem;
            overflow-y: auto;
        }
        
        .sidebar-menu-button {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 0.5rem;
            border-radius: var(--radius);
            background: none;
            border: none;
            color: hsl(var(--sidebar-foreground));
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            text-align: left;
            cursor: pointer;
            gap: 0.5rem;
        }

        .sidebar-menu-button:hover, .sidebar-menu-button.active {
            background-color: hsl(var(--sidebar-accent));
            color: hsl(var(--sidebar-accent-foreground));
        }

        .sidebar-group-label {
            padding: 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: hsl(var(--muted-foreground));
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #chat-sessions {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #chat-sessions li {
            padding: 0.25rem 0.5rem;
            cursor: pointer;
            border-radius: 0.25rem;
        }
        #chat-sessions li:hover {
            background-color: hsl(var(--sidebar-accent));
        }


        #sidebar-footer {
            padding: 1rem;
            border-top: 1px solid hsl(var(--sidebar-border));
        }

        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #main-header {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid hsl(var(--border));
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        #sidebar-toggle {
            background: none;
            border: none;
            color: hsl(var(--foreground));
            cursor: pointer;
            display: none;
        }

        #main-header h2 {
            font-size: 1.25rem;
            font-weight: 900;
        }


        #chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            display: flex;
            gap: 1rem;
            max-width: 75%;
            animation: fadeIn 0.5s ease-in-out;
        }
        
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        
        .message.assistant {
            align-self: flex-start;
        }
        
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .avatar.user-avatar {
            background-color: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
        }
        
        .avatar.ai-avatar {
            background-color: black;
            color: white;
            font-weight: 900;
        }

        .message-content {
            padding: 0.75rem;
            border-radius: var(--radius);
            line-height: 1.6;
        }
        
        .message.user .message-content {
            background-color: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
        }
        
        .message.assistant .message-content {
            background-color: hsl(var(--card));
            border: 1px solid hsl(var(--border));
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #form-container {
            padding: 1rem 2rem;
            border-top: 1px solid hsl(var(--border));
            background-color: hsl(var(--background));
        }

        #chat-form {
            display: flex;
            gap: 1rem;
        }

        #chat-input {
            flex-grow: 1;
            padding: 0.75rem 1rem;
            border-radius: 9999px;
            border: none;
            background-color: hsl(var(--secondary));
            color: hsl(var(--foreground));
            font-size: 1rem;
            outline: none;
        }
        
        #chat-input:focus {
            box-shadow: 0 0 0 2px hsl(var(--ring));
        }

        #chat-form button {
            padding: 0.75rem 1.5rem;
            border: none;
            background-color: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            border-radius: 9999px;
            cursor: pointer;
            font-weight: 500;
        }
        #chat-form button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .cursor {
            display: inline-block;
            animation: blink 1s steps(1) infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

    </style>
</head>
<body class="light">

    <aside id="sidebar">
        <div id="sidebar-header">
            <div class="logo">H</div>
            <h1>HariumAI</h1>
        </div>
        <div id="sidebar-content">
             <button class="sidebar-menu-button" id="new-chat-btn">
                <i data-lucide="plus-circle"></i>
                <span>New Chat</span>
            </button>
            <div class="sidebar-group-label">
                <i data-lucide="history"></i>
                <span>Recent Chats</span>
            </div>
            <ul id="chat-sessions">
                <!-- Chat sessions will be loaded here -->
            </ul>
        </div>
        <div id="sidebar-footer">
             <button class="sidebar-menu-button">
                <i data-lucide="user"></i>
                <span>User</span>
            </button>
        </div>
    </aside>

    <main id="main-content">
        <header id="main-header">
            <button id="sidebar-toggle">
                <i data-lucide="menu"></i>
            </button>
            <h2>Harium AI</h2>
        </header>
        <div id="chat-container">
            <!-- Messages will be appended here -->
        </div>
        <div id="form-container">
            <form id="chat-form">
                <input type="text" id="chat-input" placeholder="Send a message..." autocomplete="off">
                <button type="submit" id="send-btn">Send</button>
            </form>
        </div>
    </main>
    
    <script>
        lucide.createIcons();
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const sessionsList = document.getElementById('chat-sessions');
        const newChatBtn = document.getElementById('new-chat-btn');
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebar-toggle');

        let currentSessionId = null;

        const API_URL = 'https://harium-ai-backend.onrender.com';

        // --- Sidebar Logic ---
        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            if(window.innerWidth > 768) {
                 sidebar.classList.toggle('collapsed');
            }
        });

        // Close sidebar if clicking outside on mobile
        document.getElementById('main-content').addEventListener('click', () => {
            if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
            }
        });

        // --- Chat Logic ---

        function renderMessage(role, text) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', role);

            const avatarDiv = document.createElement('div');
            avatarDiv.classList.add('avatar', role === 'user' ? 'user-avatar' : 'ai-avatar');
            const avatarIcon = document.createElement('i');
             if(role === 'user') {
                avatarIcon.setAttribute('data-lucide', 'user');
             } else {
                avatarDiv.textContent = 'H';
             }

            const contentDiv = document.createElement('div');
            contentDiv.classList.add('message-content');
            
            messageDiv.appendChild(avatarDiv);
            messageDiv.appendChild(contentDiv);
            if(role === 'user') {
                avatarDiv.appendChild(avatarIcon);
            }


            if (role === 'assistant') {
                typewriterEffect(contentDiv, text);
            } else {
                contentDiv.textContent = text;
            }
            
            chatContainer.appendChild(messageDiv);
            lucide.createIcons();
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function typewriterEffect(element, text) {
            let i = 0;
            element.innerHTML = '';
            const cursorSpan = document.createElement('span');
            cursorSpan.className = 'cursor';
            cursorSpan.textContent = '●';

            function type() {
                if (i < text.length) {
                    element.innerHTML = text.substring(0, i + 1) + '<span class="cursor">●</span>';
                    i++;
                    setTimeout(type, 20);
                } else {
                     element.innerHTML = text;
                }
            }
            type();
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const prompt = chatInput.value.trim();
            if (!prompt) return;

            renderMessage('user', prompt);
            chatInput.value = '';
            sendBtn.disabled = true;

            if (!currentSessionId) {
                currentSessionId = 'chat_' + Date.now();
            }

            try {
                const response = await fetch(`${API_URL}/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, sessionId: currentSessionId })
                });

                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                renderMessage('assistant', data.response);

                if(!sessionsList.querySelector(`[data-session-id="${currentSessionId}"]`)) {
                   loadSessions(); // Refresh session list if it's a new chat
                }

            } catch (error) {
                console.error('Error:', error);
                renderMessage('assistant', 'Sorry, I encountered an error. Please try again.');
            } finally {
                sendBtn.disabled = false;
            }
        }
        
        async function loadSessions() {
            try {
                const response = await fetch(`${API_URL}/sessions`);
                if (!response.ok) throw new Error('Failed to fetch sessions');
                const sessions = await response.json();
                
                sessionsList.innerHTML = ''; // Clear existing list
                sessions.forEach(session => {
                    const li = document.createElement('li');
                    li.textContent = session.title || 'New Chat';
                    li.dataset.sessionId = session.sessionId;
                    li.addEventListener('click', () => loadChat(session.sessionId));
                    sessionsList.appendChild(li);
                });
            } catch(error) {
                console.error("Error loading sessions:", error);
            }
        }

        async function loadChat(sessionId) {
            try {
                const response = await fetch(`${API_URL}/chat/${sessionId}`);
                if (!response.ok) throw new Error('Failed to fetch chat history');
                const history = await response.json();

                chatContainer.innerHTML = ''; // Clear current chat
                currentSessionId = sessionId;

                history.forEach(message => {
                    renderMessage(message.role, message.content);
                });

            } catch (error) {
                 console.error("Error loading chat:", error);
            }
        }
        
        function startNewChat() {
            chatContainer.innerHTML = '';
            currentSessionId = null;
        }

        chatForm.addEventListener('submit', handleFormSubmit);
        newChatBtn.addEventListener('click', startNewChat);

        // Initial Load
        loadSessions();

    </script>
</body>
</html>
